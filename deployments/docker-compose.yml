services:
  redis:
    image: redis:7
    container_name: urban-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: urban-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: deployments-kafka-1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: urban-zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  fake-data-service:
    build:
      context: ../services/fake-data-service
      dockerfile: deployments/Dockerfile
    container_name: fake-data-service
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=urban-redis:6379

  kafka-gatekeeper:
    build:
      context: ../services/kafka-gatekeeper
      dockerfile: deployments/Dockerfile
    container_name: kafka-gatekeeper
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      - REDIS_URL=urban-redis:6379
      - KAFKA_BROKER=kafka:9092

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: urban-clickhouse
    environment:
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=urban123
      - CLICKHOUSE_DB=default
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  analytics-consumer:
    build:
      context: ../services/analytics-consumer
      dockerfile: deployments/Dockerfile
    container_name: analytics-consumer
    depends_on:
      kafka:
        condition: service_started
      clickhouse:
        condition: service_healthy
    environment:
      - KAFKA_BROKER=kafka:9092
      - CLICKHOUSE_HOST=urban-clickhouse
      - CLICKHOUSE_PORT=9000
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=urban123
      - CLICKHOUSE_DB=default

volumes:
  clickhouse_data: