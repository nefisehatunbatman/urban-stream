services:
  redis:
    image: redis:7
    container_name: urban-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: urban-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: deployments-kafka-1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: urban-zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  fake-data-service:
    build:
      context: ../services/fake-data-service
      dockerfile: deployments/Dockerfile
    container_name: fake-data-service
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=urban-redis:6379

  kafka-gatekeeper:
    build:
      context: ../services/kafka-gatekeeper
      dockerfile: deployments/Dockerfile
    container_name: kafka-gatekeeper
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      - REDIS_URL=urban-redis:6379
      - KAFKA_BROKER=kafka:9092

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: urban-clickhouse
    environment:
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=urban123
      - CLICKHOUSE_DB=default
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  analytics-consumer:
    build:
      context: ../services/analytics-consumer
      dockerfile: deployments/Dockerfile
    container_name: analytics-consumer
    depends_on:
      kafka:
        condition: service_started
      clickhouse:
        condition: service_healthy
    environment:
      - KAFKA_BROKER=kafka:9092
      - CLICKHOUSE_HOST=urban-clickhouse
      - CLICKHOUSE_PORT=9000
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=urban123
      - CLICKHOUSE_DB=default

  ai-service:
    build:
      context: ../services/ai-service
      dockerfile: deployments/Dockerfile
    container_name: urban-ai-service
    depends_on:
      clickhouse:
        condition: service_healthy
    environment:
      - CLICKHOUSE_HOST=urban-clickhouse
      - CLICKHOUSE_PORT=9000
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=urban123
      - CLICKHOUSE_DB=default
      - HISTORY_DAYS=30
      - FORECAST_DAYS=14
      - SCHEDULER_HOUR=0
      - SCHEDULER_MINUTE=0

  postgres:
    image: postgres:16-alpine
    container_name: urban-postgres
    environment:
      - POSTGRES_USER=urban
      - POSTGRES_PASSWORD=urban123
      - POSTGRES_DB=auth_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U urban -d auth_db"]
      interval: 5s
      timeout: 3s
      retries: 10

  auth-service:
    build:
      context: ../services/auth-service
      dockerfile: deployments/Dockerfile
    container_name: urban-auth-service
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      - PORT=8081
      - POSTGRES_HOST=urban-postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=urban
      - POSTGRES_PASSWORD=urban123
      - POSTGRES_DB=auth_db
      - PRIVATE_KEY_PATH=/app/keys/private.pem
      - PUBLIC_KEY_PATH=/app/keys/public.pem
      - ACCESS_TOKEN_MINUTES=15
      - REFRESH_TOKEN_DAYS=7
    volumes:
      - ../services/auth-service/keys:/app/keys:ro

  api-service:
    build:
      context: ../services/api-service
      dockerfile: deployments/Dockerfile
    container_name: urban-api-service
    depends_on:
      clickhouse:
        condition: service_healthy
      kafka:
        condition: service_started
    ports:
      - "8082:8082"
    environment:
      - PORT=8082
      - CLICKHOUSE_HOST=urban-clickhouse
      - CLICKHOUSE_PORT=9000
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=urban123
      - CLICKHOUSE_DB=default
      - PUBLIC_KEY_PATH=/app/keys/public.pem
      - KAFKA_BROKER=kafka:9092
    volumes:
      - ../services/auth-service/keys:/app/keys:ro

volumes:
  clickhouse_data:
  postgres_data: